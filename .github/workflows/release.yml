name: Build and Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Manifest Version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.json.tmp
          mv src/manifest.json.tmp src/manifest.json

      - name: Build Chrome Extension
        run: |
          mkdir -p build/chrome
          cp -r src/* build/chrome/
          cd build/chrome
          zip -r ../../koalaclicker-chrome.zip *
          cd ../..

      - name: Build Firefox Extension
        run: |
          mkdir -p build/firefox
          cp -r src/* build/firefox/
          cd build/firefox
          # Inject browser_specific_settings for Firefox
          jq '. + { "browser_specific_settings": { "gecko": { "id": "koalaclicker@shik3i.github.io", "strict_min_version": "109.0" } } }' manifest.json > manifest_tmp.json
          mv manifest_tmp.json manifest.json
          zip -r ../../koalaclicker-firefox.zip *
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            koalaclicker-chrome.zip
            koalaclicker-firefox.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
