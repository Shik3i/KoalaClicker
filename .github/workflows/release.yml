name: Build and Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run check

      - name: Build browser extension ZIPs
        run: npm run build:extension -- --version="${GITHUB_REF_NAME#v}"

      - name: Build reviewer source archive and checksums
        run: |
          git archive --format=zip --output="dist/koalaclicker-source-${GITHUB_REF_NAME}.zip" HEAD
          cd dist
          sha256sum koalaclicker-*.zip > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/koalaclicker-chrome-*.zip
            dist/koalaclicker-firefox-*.zip
            dist/koalaclicker-source-*.zip
            dist/SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
